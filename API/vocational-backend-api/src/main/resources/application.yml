spring:
  application:
    name: vocational-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Integracion con FastAPI (vocational-ai-service)
vocational:
  python-api:
    url: ${PYTHON_API_URL:http://127.0.0.1:8000}
